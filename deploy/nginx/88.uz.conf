server {
    listen 443 ssl;
    server_name www.88.uz;

    ssl_certificate /etc/letsencrypt/live/88.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/88.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://88.uz$request_uri;
}

server {
    listen 443 ssl;
    server_name 88.uz;

    root /var/www/88.uz/dist;
    index index.html;
    error_page 404 /404.html;

    ssl_certificate /etc/letsencrypt/live/88.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/88.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # The Russian site used to live at URLs without a language prefix.
    # $request_uri preserves both the path and its query string.
    location = / {
        return 301 /ru/$is_args$args;
    }

    location ~ ^/(catalog|wishlist|blog|product)(?:/|$) {
        return 301 /ru$request_uri;
    }

    location ~ ^/(measuring-tools|thermal-detectors|auto-service|tools-equipment|smart-electronics|health-beauty|pet-products|home-gadgets|kids-products|fashion-style)(?:/|$) {
        return 301 /ru$request_uri;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Do not cache HTML for long.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 90d;
        add_header Cache-Control "public, max-age=7776000";
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/88.uz.access.log;
    error_log /var/log/nginx/88.uz.error.log;
}

server {
    listen 80;
    server_name 88.uz www.88.uz;
    return 301 https://88.uz$request_uri;
}
